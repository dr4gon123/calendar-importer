<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>{{ page.title }}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  {% if page.google_verification %}<meta name="google-site-verification" content="{{ page.google_verification }}" />{% endif %}
  <style>
    body { font: 16px/1.6 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; max-width: 760px; margin: 40px auto; padding: 0 16px; color: #222; }
    h1 { font-size: 1.7em; }
    table { border-collapse: collapse; width: 100%; margin: 1em 0; }
    th, td { border: 1px solid #ddd; padding: 8px; text-align: left; vertical-align: top; }
    th { background: #f3f3f3; }
    code { background: #f3f3f3; padding: 2px 4px; border-radius: 3px; font-size: 0.9em; }
    a { color: #1a73e8; }
  </style>
</head>
<body>
  {{ content }}
</body>
</html>
