<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" width="96" height="96">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#4285F4"/>
      <stop offset="1" stop-color="#0F9D58"/>
    </linearGradient>
    <clipPath id="cardClip"><rect x="25" y="24" width="46" height="54" rx="7"/></clipPath>
  </defs>
  <!-- gradient tile -->
  <rect x="4" y="4" width="88" height="88" rx="20" fill="url(#bg)"/>
  <!-- binder rings -->
  <rect x="34" y="19" width="5" height="12" rx="2.5" fill="#1A73E8"/>
  <rect x="57" y="19" width="5" height="12" rx="2.5" fill="#1A73E8"/>
  <!-- calendar/sheet card -->
  <rect x="25" y="24" width="46" height="54" rx="7" fill="#ffffff"/>
  <g clip-path="url(#cardClip)">
    <rect x="25" y="24" width="46" height="13" fill="#4285F4"/>
    <!-- day grid: gray days above, green "filled/imported" row below -->
    <g fill="#E8EAED">
      <rect x="31" y="42" width="9" height="7" rx="2"/>
      <rect x="43" y="42" width="9" height="7" rx="2"/>
      <rect x="55" y="42" width="9" height="7" rx="2"/>
      <rect x="31" y="53" width="9" height="7" rx="2"/>
      <rect x="43" y="53" width="9" height="7" rx="2"/>
      <rect x="55" y="53" width="9" height="7" rx="2"/>
    </g>
    <g fill="#0F9D58">
      <rect x="31" y="64" width="9" height="7" rx="2"/>
      <rect x="43" y="64" width="9" height="7" rx="2"/>
      <rect x="55" y="64" width="9" height="7" rx="2"/>
    </g>
  </g>
</svg>
