<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 560" width="1400" height="560">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#4285F4"/>
      <stop offset="1" stop-color="#0F9D58"/>
    </linearGradient>
    <linearGradient id="tilebg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#4285F4"/>
      <stop offset="1" stop-color="#0F9D58"/>
    </linearGradient>
    <clipPath id="cardClip"><rect x="25" y="24" width="46" height="54" rx="7"/></clipPath>
  </defs>

  <rect width="1400" height="560" fill="url(#bg)"/>

  <!-- faint sheet-row pattern on the right -->
  <g stroke="#ffffff" stroke-opacity="0.08" stroke-width="3">
    <line x1="980" y1="90" x2="1340" y2="90"/>
    <line x1="980" y1="170" x2="1340" y2="170"/>
    <line x1="980" y1="250" x2="1340" y2="250"/>
    <line x1="980" y1="330" x2="1340" y2="330"/>
    <line x1="980" y1="410" x2="1340" y2="410"/>
    <line x1="980" y1="490" x2="1340" y2="490"/>
  </g>

  <!-- large icon (icon.svg scaled 3.6x) -->
  <g transform="translate(108,112) scale(3.6)">
    <rect x="4" y="4" width="88" height="88" rx="20" fill="url(#tilebg)"/>
    <rect x="34" y="19" width="5" height="12" rx="2.5" fill="#1A73E8"/>
    <rect x="57" y="19" width="5" height="12" rx="2.5" fill="#1A73E8"/>
    <rect x="25" y="24" width="46" height="54" rx="7" fill="#ffffff"/>
    <g clip-path="url(#cardClip)">
      <rect x="25" y="24" width="46" height="13" fill="#4285F4"/>
      <g fill="#E8EAED">
        <rect x="31" y="42" width="9" height="7" rx="2"/>
        <rect x="43" y="42" width="9" height="7" rx="2"/>
        <rect x="55" y="42" width="9" height="7" rx="2"/>
        <rect x="31" y="53" width="9" height="7" rx="2"/>
        <rect x="43" y="53" width="9" height="7" rx="2"/>
        <rect x="55" y="53" width="9" height="7" rx="2"/>
      </g>
      <g fill="#0F9D58">
        <rect x="31" y="64" width="9" height="7" rx="2"/>
        <rect x="43" y="64" width="9" height="7" rx="2"/>
        <rect x="55" y="64" width="9" height="7" rx="2"/>
      </g>
    </g>
  </g>

  <!-- title + tagline -->
  <text x="520" y="280" font-family="Liberation Sans" font-size="104" font-weight="700" fill="#ffffff">Calendar Importer</text>
  <text x="528" y="350" font-family="Liberation Sans" font-size="42" font-weight="400" fill="#ffffff" fill-opacity="0.92">Import Google Calendar events into your sheets</text>
</svg>
