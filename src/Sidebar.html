<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <base target="_top">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Google Sans', Roboto, Arial, sans-serif;
      font-size: 13px;
      color: #202124;
      background: #fff;
      padding: 16px;
    }

    h2 {
      font-size: 15px;
      font-weight: 500;
      color: #1a73e8;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .section {
      margin-bottom: 18px;
    }

    .section-label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #5f6368;
      margin-bottom: 8px;
    }

    .date-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .date-field label {
      display: block;
      font-size: 11px;
      color: #5f6368;
      margin-bottom: 3px;
    }

    input[type="date"] {
      width: 100%;
      padding: 6px 8px;
      border: 1px solid #dadce0;
      border-radius: 4px;
      font-size: 12px;
      color: #202124;
      background: #fff;
      outline: none;
      transition: border-color 0.15s;
    }

    input[type="date"]:focus {
      border-color: #1a73e8;
    }

    .calendar-search {
      display: block;
      width: 100%;
      padding: 6px 8px;
      border: 1px solid #dadce0;
      border-bottom: none;
      border-radius: 4px 4px 0 0;
      font-size: 12px;
      color: #202124;
      background: #fff;
      outline: none;
    }

    .calendar-search:focus {
      border-color: #1a73e8;
      border-bottom: none;
    }

    .calendar-list {
      border: 1px solid #dadce0;
      border-radius: 0 0 4px 4px;
      max-height: 260px;
      overflow-y: auto;
    }

    .calendar-list-header {
      padding: 8px 10px;
      border-bottom: 1px solid #dadce0;
      background: #f8f9fa;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
    }

    .toggle-all {
      font-size: 11px;
      color: #1a73e8;
      cursor: pointer;
      user-select: none;
    }

    .toggle-all:hover { text-decoration: underline; }

    .cal-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 7px 10px;
      border-bottom: 1px solid #f1f3f4;
      cursor: pointer;
      transition: background 0.1s;
    }

    .cal-item:last-child { border-bottom: none; }
    .cal-item:hover { background: #f8f9fa; }

    .cal-swatch {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .cal-name {
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    input[type="checkbox"] {
      accent-color: #1a73e8;
      cursor: pointer;
      flex-shrink: 0;
    }

    .loading-calendars {
      padding: 20px;
      text-align: center;
      color: #5f6368;
    }

    .btn-import {
      width: 100%;
      padding: 9px;
      background: #1a73e8;
      color: #fff;
      border: none;
      border-radius: 4px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: background 0.15s;
    }

    .btn-import:hover:not(:disabled) { background: #1557b0; }
    .btn-import:disabled { background: #dadce0; color: #80868b; cursor: default; }

    .spinner {
      width: 14px;
      height: 14px;
      border: 2px solid rgba(255,255,255,0.4);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: none;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .status {
      margin-top: 12px;
      padding: 9px 12px;
      border-radius: 4px;
      font-size: 12px;
      display: none;
    }

    .status.success {
      background: #e6f4ea;
      color: #137333;
      border: 1px solid #ceead6;
      display: block;
    }

    .status.error {
      background: #fce8e6;
      color: #c5221f;
      border: 1px solid #f5c6c4;
      display: block;
    }
  </style>
</head>
<body>

  <h2>
    <svg width="18" height="18" viewBox="0 0 24 24" fill="#1a73e8"><path d="M19 3h-1V1h-2v2H8V1H6v2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H5V8h14v11zM7 10h5v5H7z"/></svg>
    Calendar Importer
  </h2>

  <!-- Date Range -->
  <div class="section">
    <div class="section-label">Date Range</div>
    <div class="date-row">
      <div class="date-field">
        <label for="startDate">Start</label>
        <input type="date" id="startDate">
      </div>
      <div class="date-field">
        <label for="endDate">End</label>
        <input type="date" id="endDate">
      </div>
    </div>
  </div>

  <!-- Calendar Selection -->
  <div class="section">
    <div class="section-label">Calendars</div>
    <input type="text" class="calendar-search" id="calSearch" placeholder="Search calendars…" oninput="filterCalendars()" style="display:none">
    <div class="calendar-list" id="calendarList">
      <div class="loading-calendars">Loading calendars…</div>
    </div>
  </div>

  <!-- Import Button -->
  <button class="btn-import" id="importBtn" onclick="runImport()">
    <span class="spinner" id="spinner"></span>
    <span id="btnLabel">Import Events</span>
  </button>

  <div class="status" id="status"></div>

  <script>
    // ── Init: set default dates ──────────────────────────────────────────────
    (function initDates() {
      const today = new Date();
      const future = new Date();
      future.setDate(today.getDate() + 30);
      document.getElementById('startDate').value = toDateString(today);
      document.getElementById('endDate').value   = toDateString(future);
    })();

    function toDateString(d) {
      return d.toISOString().slice(0, 10);
    }

    // ── Load calendars ───────────────────────────────────────────────────────
    google.script.run
      .withSuccessHandler(renderCalendars)
      .withFailureHandler(function(err) {
        document.getElementById('calendarList').innerHTML =
          '<div class="loading-calendars" style="color:#c5221f">Failed to load calendars</div>';
      })
      .getCalendars();

    var allCalendars = [];
    var checkedState = {};  // source of truth: calId → boolean

    function renderCalendars(calendars) {
      if (!calendars || calendars.length === 0) {
        document.getElementById('calendarList').innerHTML =
          '<div class="loading-calendars">No calendars found</div>';
        return;
      }

      allCalendars = calendars;

      // Initialize all as checked
      calendars.forEach(cal => { checkedState[cal.id] = true; });

      document.getElementById('calSearch').style.display = 'block';
      buildCalendarList(calendars);
    }

    function updateCountLabel() {
      const el = document.getElementById('calCount');
      if (!el) return;
      const selected = Object.values(checkedState).filter(Boolean).length;
      el.textContent = `${selected} of ${allCalendars.length} selected`;
    }

    function buildCalendarList(calendars) {
      const container = document.getElementById('calendarList');

      let html = `
        <div class="calendar-list-header">
          <span style="font-size:11px;color:#5f6368" id="calCount"></span>
          <span class="toggle-all" onclick="toggleAll()">Select all / None</span>
        </div>`;

      for (const cal of calendars) {
        const color = cal.color || '#1a73e8';
        const escapedName = cal.name.replace(/"/g, '&quot;').replace(/</g, '&lt;');
        const isChecked = checkedState[cal.id];
        html += `
          <label class="cal-item">
            <input type="checkbox" class="cal-checkbox" value="${cal.id}"
              onchange="updateChecked(this)" ${isChecked ? 'checked' : ''}>
            <span class="cal-swatch" style="background:${color}"></span>
            <span class="cal-name" title="${escapedName}">${escapedName}</span>
          </label>`;
      }

      container.innerHTML = html;
      updateCountLabel();
    }

    function updateChecked(cb) {
      checkedState[cb.value] = cb.checked;
      updateCountLabel();
    }

    function filterCalendars() {
      const query = document.getElementById('calSearch').value.toLowerCase();
      document.querySelectorAll('.cal-item').forEach(function(item) {
        const name = item.querySelector('.cal-name').textContent.toLowerCase();
        item.style.display = name.includes(query) ? '' : 'none';
      });
      const visible = document.querySelectorAll('.cal-item:not([style*="display: none"])').length;
      const total = allCalendars.length;
      document.getElementById('calCount').textContent =
        visible < total
          ? `${Object.values(checkedState).filter(Boolean).length} selected · ${visible} of ${total} shown`
          : `${Object.values(checkedState).filter(Boolean).length} of ${total} selected`;
    }

    // ── Toggle all checkboxes ────────────────────────────────────────────────
    function toggleAll() {
      const checkboxes = document.querySelectorAll('.cal-checkbox');
      const anyUnchecked = Array.from(checkboxes).some(cb => !cb.checked);
      checkboxes.forEach(cb => {
        cb.checked = anyUnchecked;
        checkedState[cb.value] = anyUnchecked;
      });
      updateCountLabel();
    }

    // ── Run import ───────────────────────────────────────────────────────────
    function runImport() {
      const startDate = document.getElementById('startDate').value;
      const endDate   = document.getElementById('endDate').value;

      if (!startDate || !endDate) {
        showStatus('error', 'Please set both start and end dates.');
        return;
      }
      if (startDate > endDate) {
        showStatus('error', 'Start date must be before end date.');
        return;
      }

      const calendarIds = Object.keys(checkedState).filter(id => checkedState[id]);

      if (calendarIds.length === 0) {
        showStatus('error', 'Please select at least one calendar.');
        return;
      }

      setLoading(true);
      hideStatus();

      google.script.run
        .withSuccessHandler(function(result) {
          setLoading(false);
          showStatus('success',
            `Imported ${result.count} event${result.count !== 1 ? 's' : ''} into "${result.sheetName}".`);
        })
        .withFailureHandler(function(err) {
          setLoading(false);
          showStatus('error', 'Error: ' + (err.message || err));
        })
        .importEvents({ startDate, endDate, calendarIds });
    }

    function setLoading(on) {
      const btn = document.getElementById('importBtn');
      const spinner = document.getElementById('spinner');
      const label = document.getElementById('btnLabel');
      btn.disabled = on;
      spinner.style.display = on ? 'block' : 'none';
      label.textContent = on ? 'Importing…' : 'Import Events';
    }

    function showStatus(type, msg) {
      const el = document.getElementById('status');
      el.className = 'status ' + type;
      el.textContent = msg;
    }

    function hideStatus() {
      const el = document.getElementById('status');
      el.className = 'status';
    }
  </script>
</body>
</html>
