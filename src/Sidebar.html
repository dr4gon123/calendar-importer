<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <base target="_top">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Google Sans', Roboto, Arial, sans-serif;
      font-size: 13px;
      color: #202124;
      background: #fff;
      padding: 16px;
    }

    h2 {
      font-size: 15px;
      font-weight: 500;
      color: #1a73e8;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .section {
      margin-bottom: 18px;
    }

    .section-label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #5f6368;
      margin-bottom: 8px;
    }

    /* ── Date range ── */
    .date-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 8px;
    }

    .date-field label {
      display: block;
      font-size: 11px;
      color: #5f6368;
      margin-bottom: 3px;
    }

    input[type="date"] {
      width: 100%;
      padding: 6px 8px;
      border: 1px solid #dadce0;
      border-radius: 4px;
      font-size: 12px;
      color: #202124;
      background: #fff;
      outline: none;
      transition: border-color 0.15s;
    }

    input[type="date"]:focus { border-color: #1a73e8; }

    .preset-row {
      display: flex;
      gap: 5px;
      margin-top: 5px;
    }

    .preset-btn {
      flex: 1;
      padding: 4px 0;
      border: 1px solid #dadce0;
      border-radius: 12px;
      background: #f8f9fa;
      font-size: 11px;
      color: #5f6368;
      cursor: pointer;
      text-align: center;
      transition: background 0.1s, border-color 0.1s, color 0.1s;
      white-space: nowrap;
    }

    .preset-btn:hover {
      background: #e8f0fe;
      border-color: #1a73e8;
      color: #1a73e8;
    }

    .preset-btn.active {
      background: #e8f0fe;
      border-color: #1a73e8;
      color: #1a73e8;
      font-weight: 500;
    }

    /* ── Calendar list ── */
    .calendar-search,
    .col-search {
      display: block;
      width: 100%;
      padding: 6px 8px;
      border: 1px solid #dadce0;
      border-bottom: none;
      border-radius: 4px 4px 0 0;
      font-size: 12px;
      color: #202124;
      background: #fff;
      outline: none;
    }

    .calendar-search:focus,
    .col-search:focus {
      border-color: #1a73e8;
      border-bottom: none;
    }

    .calendar-list {
      border: 1px solid #dadce0;
      border-radius: 0 0 4px 4px;
      max-height: 220px;
      overflow-y: auto;
    }

    .calendar-list-header {
      padding: 8px 10px;
      border-bottom: 1px solid #dadce0;
      background: #f8f9fa;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
    }

    .toggle-all {
      font-size: 11px;
      color: #1a73e8;
      cursor: pointer;
      user-select: none;
    }

    .toggle-all:hover { text-decoration: underline; }

    .cal-header-actions { display: flex; gap: 10px; }
    .toggle-all.active { font-weight: 600; text-decoration: underline; }

    .cal-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 7px 10px;
      border-bottom: 1px solid #f1f3f4;
      cursor: pointer;
      transition: background 0.1s;
    }

    .cal-item:last-child { border-bottom: none; }
    .cal-item:hover { background: #f8f9fa; }

    .cal-swatch {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .cal-name {
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    input[type="checkbox"] {
      accent-color: #1a73e8;
      cursor: pointer;
      flex-shrink: 0;
    }

    .loading-calendars {
      padding: 20px;
      text-align: center;
      color: #5f6368;
    }

    /* ── Collapsible columns section ── */
    .collapsible-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: pointer;
      user-select: none;
      margin-bottom: 0;
    }

    .collapsible-header:hover .section-label { color: #1a73e8; }

    .collapsible-arrow {
      font-size: 10px;
      color: #5f6368;
      transition: transform 0.2s;
    }

    .collapsible-arrow.open { transform: rotate(180deg); }

    .collapsible-body {
      display: none;
      margin-top: 8px;
    }

    .collapsible-body.open { display: block; }

    .columns-list {
      border: 1px solid #dadce0;
      border-radius: 0 0 4px 4px;
      max-height: 180px;
      overflow-y: auto;
    }

    .columns-list-header {
      padding: 6px 10px;
      border-bottom: 1px solid #dadce0;
      background: #f8f9fa;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
    }

    .col-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 5px 10px;
      border-bottom: 1px solid #f1f3f4;
      cursor: pointer;
      transition: background 0.1s;
    }

    .col-item:last-child { border-bottom: none; }
    .col-item:hover { background: #f8f9fa; }

    /* ── Import button ── */
    .btn-import {
      width: 100%;
      padding: 9px;
      background: #1a73e8;
      color: #fff;
      border: none;
      border-radius: 4px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: background 0.15s;
    }

    .btn-import:hover:not(:disabled) { background: #1557b0; }
    .btn-import:disabled { background: #dadce0; color: #80868b; cursor: default; }

    .spinner {
      width: 14px;
      height: 14px;
      border: 2px solid rgba(255,255,255,0.4);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: none;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .status {
      margin-top: 12px;
      padding: 9px 12px;
      border-radius: 4px;
      font-size: 12px;
      display: none;
    }

    .status.success {
      background: #e6f4ea;
      color: #137333;
      border: 1px solid #ceead6;
      display: block;
    }

    .status.error {
      background: #fce8e6;
      color: #c5221f;
      border: 1px solid #f5c6c4;
      display: block;
    }
  </style>
</head>
<body>

  <h2>
    <svg width="18" height="18" viewBox="0 0 24 24" fill="#1a73e8"><path d="M19 3h-1V1h-2v2H8V1H6v2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H5V8h14v11zM7 10h5v5H7z"/></svg>
    Calendar Importer
  </h2>

  <!-- Date Range -->
  <div class="section">
    <div class="section-label">Date Range</div>
    <div class="date-row">
      <div class="date-field">
        <label for="startDate">Start</label>
        <input type="date" id="startDate">
      </div>
      <div class="date-field">
        <label for="endDate">End</label>
        <input type="date" id="endDate">
      </div>
    </div>
    <div class="preset-row" id="modifierRow">
      <button class="preset-btn" onclick="selectModifier('last')">Last</button>
      <button class="preset-btn" onclick="selectModifier('this')">This</button>
      <button class="preset-btn" onclick="selectModifier('next')">Next</button>
    </div>
    <div class="preset-row" id="unitRow">
      <button class="preset-btn" onclick="selectUnit('day')">Day</button>
      <button class="preset-btn" onclick="selectUnit('week')">Week</button>
      <button class="preset-btn" onclick="selectUnit('month')">Month</button>
      <button class="preset-btn" onclick="selectUnit('quarter')">Quarter</button>
      <button class="preset-btn" onclick="selectUnit('year')">Year</button>
    </div>
  </div>

  <!-- Calendar Selection -->
  <div class="section">
    <div class="section-label">Calendars</div>
    <input type="text" class="calendar-search" id="calSearch" placeholder="Search calendars…" oninput="filterCalendars()" style="display:none">
    <div class="calendar-list" id="calendarList">
      <div class="loading-calendars">Loading calendars…</div>
    </div>
  </div>

  <!-- Column Selector (collapsible) -->
  <div class="section">
    <div class="collapsible-header" onclick="toggleColumns()">
      <div class="section-label" style="margin-bottom:0">Columns</div>
      <span class="collapsible-arrow" id="colArrow">▼</span>
    </div>
    <div class="collapsible-body" id="colBody">
      <input type="text" class="col-search" id="colSearch" placeholder="Search columns…" oninput="filterColumns()">
      <div class="columns-list" id="columnsList"></div>
    </div>
  </div>

  <!-- Import Button -->
  <button class="btn-import" id="importBtn" onclick="runImport()">
    <span class="spinner" id="spinner"></span>
    <span id="btnLabel">Import Events</span>
  </button>

  <div class="status" id="status"></div>

  <script>
    var ALL_COLUMNS = [
      'Title', 'Start', 'End', 'All Day',
      'Description', 'Location', 'Attendees',
      'Calendar', 'Status', 'Creator', 'Organizer', 'Event ID',
      'Recurring', 'Recurrence',
      'Meet Link', 'Calendar Link', 'Original Start'
    ];

    var allCalendars = [];
    var checkedState = {};       // calId → boolean
    var selectedOnly = false;    // when true, the list filters to checked calendars
    var savedSettings = null;    // loaded once on open

    // ── Init ────────────────────────────────────────────────────────────────

    // Load saved settings first, then calendars (so saved selection can be applied)
    function loadCalendars() {
      google.script.run
        .withSuccessHandler(renderCalendars)
        .withFailureHandler(function() {
          document.getElementById('calendarList').innerHTML =
            '<div class="loading-calendars" style="color:#c5221f">Failed to load calendars</div>';
        })
        .getCalendars();
    }

    function applySettings(settings) {
      savedSettings = settings;
      applyDefaultDates(settings);
      buildColumnsList();
      loadCalendars();
    }

    google.script.run
      .withSuccessHandler(applySettings)
      .withFailureHandler(function() { applySettings(null); })
      .getSavedSettings();

    // ── Dates ────────────────────────────────────────────────────────────────

    function applyDefaultDates(settings) {
      if (settings && settings.startDate && settings.endDate) {
        document.getElementById('startDate').value = settings.startDate;
        document.getElementById('endDate').value   = settings.endDate;
      } else {
        const today = new Date();
        const future = new Date();
        future.setDate(today.getDate() + 30);
        document.getElementById('startDate').value = toDateString(today);
        document.getElementById('endDate').value   = toDateString(future);
      }
    }

    function toDateString(d) {
      return d.toISOString().slice(0, 10);
    }

    var selectedModifier = null;
    var selectedUnit = null;

    function selectModifier(val) {
      selectedModifier = val;
      document.querySelectorAll('#modifierRow .preset-btn').forEach(function(btn) {
        btn.classList.toggle('active', btn.textContent.toLowerCase() === val);
      });
      applyPresetIfReady();
    }

    function selectUnit(val) {
      selectedUnit = val;
      document.querySelectorAll('#unitRow .preset-btn').forEach(function(btn) {
        btn.classList.toggle('active', btn.textContent.toLowerCase() === val);
      });
      applyPresetIfReady();
    }

    function applyPresetIfReady() {
      if (!selectedModifier || !selectedUnit) return;
      var dates = computePresetDates(selectedModifier, selectedUnit);
      document.getElementById('startDate').value = toDateString(dates.start);
      document.getElementById('endDate').value   = toDateString(dates.end);
    }

    function computePresetDates(modifier, unit) {
      var today = new Date();
      var y = today.getFullYear();
      var m = today.getMonth(); // 0-based
      var offset = modifier === 'last' ? -1 : modifier === 'next' ? 1 : 0;
      var start, end;

      if (unit === 'day') {
        start = new Date(y, m, today.getDate() + offset);
        end   = new Date(start);

      } else if (unit === 'week') {
        var dow = today.getDay();
        var daysFromMon = dow === 0 ? 6 : dow - 1; // Monday = 0
        var thisMonday = new Date(y, m, today.getDate() - daysFromMon);
        start = new Date(thisMonday); start.setDate(thisMonday.getDate() + offset * 7);
        end   = new Date(start);     end.setDate(start.getDate() + 6);

      } else if (unit === 'month') {
        start = new Date(y, m + offset, 1);
        end   = new Date(y, m + offset + 1, 0);

      } else if (unit === 'quarter') {
        var currentQ = Math.floor(m / 3);
        var targetQ  = currentQ + offset;
        var targetY  = y + Math.floor(targetQ / 4);
        targetQ = ((targetQ % 4) + 4) % 4; // wrap to 0–3
        start = new Date(targetY, targetQ * 3, 1);
        end   = new Date(targetY, targetQ * 3 + 3, 0);

      } else if (unit === 'year') {
        start = new Date(y + offset, 0, 1);
        end   = new Date(y + offset, 11, 31);
      }

      return { start: start, end: end };
    }

    // ── Calendars ───────────────────────────────────────────────────────────

    function renderCalendars(calendars) {
      if (!calendars || calendars.length === 0) {
        document.getElementById('calendarList').innerHTML =
          '<div class="loading-calendars">No calendars found</div>';
        return;
      }

      allCalendars = calendars;

      // Initialize all as checked, then apply saved selection if available
      const savedIds = savedSettings && savedSettings.selectedCalendarIds;
      calendars.forEach(cal => {
        checkedState[cal.id] = savedIds ? savedIds.includes(cal.id) : true;
      });

      document.getElementById('calSearch').style.display = 'block';
      buildCalendarList(calendars);
    }

    function updateCountLabel() {
      const el = document.getElementById('calCount');
      if (!el) return;
      const selected = Object.values(checkedState).filter(Boolean).length;
      el.textContent = `${selected} of ${allCalendars.length} selected`;
    }

    function buildCalendarList(calendars) {
      const container = document.getElementById('calendarList');

      let html = `
        <div class="calendar-list-header">
          <span style="font-size:11px;color:#5f6368" id="calCount"></span>
          <span class="cal-header-actions">
            <span class="toggle-all" id="selectedOnlyToggle" onclick="toggleSelectedOnly()">Selected</span>
            <span class="toggle-all" onclick="toggleAllCals()">All / None</span>
          </span>
        </div>`;

      for (const cal of calendars) {
        const color = cal.color || '#1a73e8';
        const escapedName = cal.name.replace(/"/g, '&quot;').replace(/</g, '&lt;');
        const isChecked = checkedState[cal.id];
        html += `
          <label class="cal-item">
            <input type="checkbox" class="cal-checkbox" value="${cal.id}"
              onchange="updateChecked(this)" ${isChecked ? 'checked' : ''}>
            <span class="cal-swatch" style="background:${color}"></span>
            <span class="cal-name" title="${escapedName}">${escapedName}</span>
          </label>`;
      }

      container.innerHTML = html;
      updateCountLabel();
    }

    function updateChecked(cb) {
      checkedState[cb.value] = cb.checked;
      updateCountLabel();
      if (selectedOnly) filterCalendars();
    }

    function filterCalendars() {
      const query = document.getElementById('calSearch').value.toLowerCase();
      let visible = 0;
      document.querySelectorAll('.cal-item').forEach(function(item) {
        const cb = item.querySelector('.cal-checkbox');
        const name = item.querySelector('.cal-name').textContent.toLowerCase();
        const show = name.includes(query) && (!selectedOnly || cb.checked);
        item.style.display = show ? '' : 'none';
        if (show) visible++;
      });
      const total = allCalendars.length;
      const selected = Object.values(checkedState).filter(Boolean).length;
      document.getElementById('calCount').textContent =
        visible < total
          ? `${selected} selected · ${visible} of ${total} shown`
          : `${selected} of ${total} selected`;
    }

    function toggleSelectedOnly() {
      selectedOnly = !selectedOnly;
      document.getElementById('selectedOnlyToggle').classList.toggle('active', selectedOnly);
      filterCalendars();
    }

    function toggleAllCals() {
      const checkboxes = document.querySelectorAll('.cal-checkbox');
      const anyUnchecked = Array.from(checkboxes).some(cb => !cb.checked);
      checkboxes.forEach(cb => {
        cb.checked = anyUnchecked;
        checkedState[cb.value] = anyUnchecked;
      });
      updateCountLabel();
      if (selectedOnly) filterCalendars();
    }

    // ── Columns ─────────────────────────────────────────────────────────────

    function buildColumnsList() {
      const savedCols = savedSettings && savedSettings.selectedColumns;
      let html = `
        <div class="columns-list-header">
          <span style="font-size:11px;color:#5f6368" id="colCount"></span>
          <span class="toggle-all" onclick="toggleAllCols()">Select all / None</span>
        </div>`;

      for (const col of ALL_COLUMNS) {
        const isChecked = savedCols ? savedCols.includes(col) : true;
        html += `
          <label class="col-item">
            <input type="checkbox" class="col-checkbox" value="${col}" onchange="updateColCountLabel()" ${isChecked ? 'checked' : ''}>
            <span>${col}</span>
          </label>`;
      }

      document.getElementById('columnsList').innerHTML = html;
      updateColCountLabel();
    }

    function updateColCountLabel() {
      const el = document.getElementById('colCount');
      if (!el) return;
      const selected = document.querySelectorAll('.col-checkbox:checked').length;
      const total = ALL_COLUMNS.length;
      el.textContent = `${selected} of ${total} selected`;
    }

    function filterColumns() {
      const query = document.getElementById('colSearch').value.toLowerCase();
      let visible = 0;
      document.querySelectorAll('.col-item').forEach(function(item) {
        const name = item.querySelector('span').textContent.toLowerCase();
        const show = name.includes(query);
        item.style.display = show ? '' : 'none';
        if (show) visible++;
      });
      const total = ALL_COLUMNS.length;
      const selected = document.querySelectorAll('.col-checkbox:checked').length;
      document.getElementById('colCount').textContent =
        visible < total
          ? `${selected} selected · ${visible} of ${total} shown`
          : `${selected} of ${total} selected`;
    }

    function toggleAllCols() {
      const checkboxes = document.querySelectorAll('.col-checkbox');
      const anyUnchecked = Array.from(checkboxes).some(cb => !cb.checked);
      checkboxes.forEach(cb => { cb.checked = anyUnchecked; });
      updateColCountLabel();
    }

    function toggleColumns() {
      const body  = document.getElementById('colBody');
      const arrow = document.getElementById('colArrow');
      const open  = body.classList.toggle('open');
      arrow.classList.toggle('open', open);
    }

    // ── Import ───────────────────────────────────────────────────────────────

    function runImport() {
      const startDate = document.getElementById('startDate').value;
      const endDate   = document.getElementById('endDate').value;

      if (!startDate || !endDate) {
        showStatus('error', 'Please set both start and end dates.');
        return;
      }
      if (startDate > endDate) {
        showStatus('error', 'Start date must be before end date.');
        return;
      }

      const selectedCals = allCalendars.filter(c => checkedState[c.id]);
      const calendarIds = selectedCals.map(c => c.id);
      const calendarNames = selectedCals.map(c => c.name);
      if (calendarIds.length === 0) {
        showStatus('error', 'Please select at least one calendar.');
        return;
      }

      const columns = Array.from(document.querySelectorAll('.col-checkbox:checked')).map(cb => cb.value);
      if (columns.length === 0) {
        showStatus('error', 'Please select at least one column.');
        return;
      }

      setLoading(true);
      hideStatus();

      google.script.run
        .withSuccessHandler(function(result) {
          setLoading(false);
          showStatus('success',
            `Imported ${result.count} event${result.count !== 1 ? 's' : ''} into "${result.sheetName}".`);
        })
        .withFailureHandler(function(err) {
          setLoading(false);
          showStatus('error', 'Error: ' + (err.message || err));
        })
        .importEvents({ startDate, endDate, calendarIds, calendarNames, columns });
    }

    function setLoading(on) {
      const btn = document.getElementById('importBtn');
      document.getElementById('spinner').style.display = on ? 'block' : 'none';
      document.getElementById('btnLabel').textContent = on ? 'Importing…' : 'Import Events';
      btn.disabled = on;
    }

    function showStatus(type, msg) {
      const el = document.getElementById('status');
      el.className = 'status ' + type;
      el.textContent = msg;
    }

    function hideStatus() {
      document.getElementById('status').className = 'status';
    }
  </script>
</body>
</html>
